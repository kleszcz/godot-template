name: Export Godot Builds

on:
  push:
    branches:
      - master
    tags:
      - 'v*'

permissions:
  contents: write

env:
  GODOT_VERSION: "4.6.3"
  GODOT_STATUS: "stable"
  GAME_NANE: "MyGame"

jobs:
  export:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip zip wget

      - name: Download Godot
        run: |
          wget \
            https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-${GODOT_STATUS}/Godot_v${GODOT_VERSION}-${GODOT_STATUS}_linux.x86_64.zip
          unzip Godot_v${GODOT_VERSION}-${GODOT_STATUS}_linux.x86_64.zip
          mv Godot_v${GODOT_VERSION}-${GODOT_STATUS}_linux.x86_64 /usr/local/bin/godot
          chmod +x /usr/local/bin/godot

      - name: Install Export Templates
        run: |
          wget \
            https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-${GODOT_STATUS}/Godot_v${GODOT_VERSION}-${GODOT_STATUS}_export_templates.tpz
          mkdir -p ~/.local/share/godot/export_templates/${GODOT_VERSION}.${GODOT_STATUS}
          unzip \
            Godot_v${GODOT_VERSION}-${GODOT_STATUS}_export_templates.tpz \
            -d templates
          cp -r templates/templates/* \
            ~/.local/share/godot/export_templates/${GODOT_VERSION}.${GODOT_STATUS}/

      - name: Verify Installation
        run: |
          godot --version
          ls -la ~/.local/share/godot/export_templates/${GODOT_VERSION}.${GODOT_STATUS}

      - name: Create build directories
        run: |
          mkdir -p builds/windows
          mkdir -p builds/linux
          mkdir -p builds/web

      - name: Export Windows
        run: |
          godot --headless \
            --export-release "Windows Desktop" \
            builds/windows/MyGame.exe

      - name: Export Linux
        run: |
          godot --headless \
            --export-release "Linux" \
            builds/linux/MyGame.x86_64

      - name: Export Web
        run: |
          godot --headless \
            --export-release "Web" \
            builds/web/index.html

      - name: Package Windows
        run: |
          cd builds/windows
          zip -r ../../${GAME_NAME}-Windows.zip .

      - name: Package Linux
        run: |
          cd builds/linux
          zip -r ../../${GAME_NAME}-Linux.zip .

      - name: Package Web
        run: |
          cd builds/web
          zip -r ../../${GAME_NAME}-Web.zip .

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${GAME_NAME}-Windows
          path: ${GAME_NAME}-Windows.zip

      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${GAME_NAME}-Linux
          path: ${GAME_NAME}-Linux.zip

      - name: Upload Web Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${GAME_NAME}-Web
          path: ${GAME_NAME}-Web.zip

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${GAME_NAME}-Windows.zip
            ${GAME_NAME}-Linux.zip
            ${GAME_NAME}-Web.zip
