name: Export Godot Builds

on:
  push:
    branches:
      - master
    tags:
      - 'v*'

permissions:
  contents: write

env:
  GODOT_VERSION: "4.6.3"
  GODOT_STATUS: "stable"
  GAME_NAME: "MyGame"
  BUTLER_VERSION: "15.27.0"

jobs:
  export:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip zip wget

      - name: Cache Godot
        uses: actions/cache@v5
        id: godot-cache
        with:
          path: |
            ~/.local/share/godot/export_templates
            /usr/local/bin/godot
          key: godot-${{ env.GODOT_VERSION }}

      - name: Download Godot
        if: steps.godot-cache.outputs.cache-hit != 'true'
        run: |
          wget \
            https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-${GODOT_STATUS}/Godot_v${GODOT_VERSION}-${GODOT_STATUS}_linux.x86_64.zip
          unzip Godot_v${GODOT_VERSION}-${GODOT_STATUS}_linux.x86_64.zip
          mv Godot_v${GODOT_VERSION}-${GODOT_STATUS}_linux.x86_64 /usr/local/bin/godot
          chmod +x /usr/local/bin/godot

      - name: Install Export Templates
        if: steps.godot-cache.outputs.cache-hit != 'true'
        run: |
          wget \
            https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-${GODOT_STATUS}/Godot_v${GODOT_VERSION}-${GODOT_STATUS}_export_templates.tpz
          mkdir -p ~/.local/share/godot/export_templates/${GODOT_VERSION}.${GODOT_STATUS}
          unzip \
            Godot_v${GODOT_VERSION}-${GODOT_STATUS}_export_templates.tpz \
            -d templates
          cp -r templates/templates/* \
            ~/.local/share/godot/export_templates/${GODOT_VERSION}.${GODOT_STATUS}/

      - name: Verify Installation
        run: |
          godot --version
          ls -la ~/.local/share/godot/export_templates/${GODOT_VERSION}.${GODOT_STATUS}

      - name: Create build directories
        run: |
          mkdir -p builds/windows
          mkdir -p builds/linux
          mkdir -p builds/web

      - name: Export Windows
        run: |
          godot --headless \
            --export-release "Windows Desktop" \
            builds/windows/${{env.GAME_NAME}}.exe

      - name: Export Linux
        run: |
          godot --headless \
            --export-release "Linux" \
            builds/linux/${{env.GAME_NAME}}.x86_64

      - name: Export Web
        run: |
          godot --headless \
            --export-release "Web" \
            builds/web/index.html

      - name: Package Windows
        run: |
          cd builds/windows
          zip -r ../../${{env.GAME_NAME}}-Windows.zip .

      - name: Package Linux
        run: |
          cd builds/linux
          zip -r ../../${{env.GAME_NAME}}-Linux.zip .

      - name: Package Web
        run: |
          cd builds/web
          zip -r ../../${{env.GAME_NAME}}-Web.zip .

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{env.GAME_NAME}}-Windows
          path: ${{env.GAME_NAME}}-Windows.zip
          archive: false

      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{env.GAME_NAME}}-Linux
          path: ${{env.GAME_NAME}}-Linux.zip
          archive: false

      - name: Upload Web Artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{env.GAME_NAME}}-Web
          path: ${{env.GAME_NAME}}-Web.zip
          archive: false

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{env.GAME_NAME}}-Windows.zip
            ${{env.GAME_NAME}}-Linux.zip
            ${{env.GAME_NAME}}-Web.zip

  # Limits: currently, the itch.io backend will reject builds with a total uncompressed size that exceeds 30GB.
  deploy-web-to-itch:
    needs: export
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v8
        with:
          name: ${{env.GAME_NAME}}-Web.zip

      - name: Cache Butler
        uses: actions/cache@v5
        id: butler-cache
        with:
          path: |
            butler
            7z.so
            libc7zip.so
          key: butler-${{ env.BUTLER_VERSION }}

      - name: Install Butler
        if: steps.butler-cache.outputs.cache-hit != 'true'
        run: |
          curl -L -o butler.zip \
            https://broth.itch.zone/butler/linux-amd64/${{ env.BUTLER_VERSION }}/archive/default

          unzip butler.zip
          chmod +x butler

      - name: Push to itch.io
        env:
          BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
        run: |
          ./butler push \
            ${{env.GAME_NAME}}-Web.zip \
            your_username/your_game:web