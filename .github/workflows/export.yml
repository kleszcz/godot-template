name: Export Godot Builds

on:
  push:
    branches:
      - master
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  export:
    runs-on: ubuntu-latest

    container:
      image: barichello/godot-ci:4.6.3

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Godot Export Templates
        uses: firebelley/godot-export@v8
        with:
          godot-version: 4.6.3
          export-debug: false

      - name: Create build directories
        run: |
          mkdir -p builds/windows
          mkdir -p builds/linux
          mkdir -p builds/web

      - name: Export Windows
        run: |
          godot --headless \
            --export-release "Windows Desktop" \
            builds/windows/MyGame.exe

      - name: Export Linux
        run: |
          godot --headless \
            --export-release "Linux" \
            builds/linux/MyGame.x86_64

      - name: Export Web
        run: |
          godot --headless \
            --export-release "Web" \
            builds/web/index.html

      - name: Package Windows
        run: |
          cd builds/windows
          zip -r ../../MyGame-Windows.zip .

      - name: Package Linux
        run: |
          cd builds/linux
          zip -r ../../MyGame-Linux.zip .

      - name: Package Web
        run: |
          cd builds/web
          zip -r ../../MyGame-Web.zip .

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MyGame-Windows
          path: MyGame-Windows.zip

      - name: Upload Linux Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MyGame-Linux
          path: MyGame-Linux.zip

      - name: Upload Web Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MyGame-Web
          path: MyGame-Web.zip

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            MyGame-Windows.zip
            MyGame-Linux.zip
            MyGame-Web.zip
